<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pintor Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@600&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:#F5F3EE;color:#1B3A5C;min-height:100vh}
#loginOverlay{position:fixed;inset:0;z-index:999;background:linear-gradient(135deg,#0d1b2a,#1a2e4a);display:flex;align-items:center;justify-content:center;padding:20px}
#loginBox{background:rgba(255,255,255,0.05);border:1px solid rgba(201,168,76,0.3);border-radius:20px;padding:40px 28px;width:100%;max-width:340px;text-align:center}
#loginBox h2{font-family:Lora,serif;color:#C9A84C;font-size:1.3rem;margin-bottom:4px}
#loginBox p{color:rgba(255,255,255,0.4);font-size:.78rem;margin-bottom:28px}
.bg{width:100%;padding:14px;border-radius:12px;border:none;background:#fff;color:#333;font-size:.9rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}
#lmsg{color:#C9A84C;font-size:.75rem;margin-top:10px;min-height:16px}
header{background:#1B3A5C;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
header h1{font-family:Lora,serif;color:#C9A84C;font-size:1.1rem}
header span{color:rgba(255,255,255,.5);font-size:.72rem}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e8e4dc;overflow-x:auto;scrollbar-width:none;position:sticky;top:52px;z-index:9}
.tab{flex:none;padding:12px 16px;font-size:.78rem;font-weight:600;color:#aaa;border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent}
.tab.on{color:#1B3A5C;border-bottom-color:#C9A84C}
.pg{display:none;padding:16px}.pg.on{display:block}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:.5px solid #e8e4dc}
.ct{font-family:Lora,serif;font-size:1rem;color:#1B3A5C;margin-bottom:14px}
label{display:block;font-size:10px;font-weight:700;color:#aaa;letter-spacing:.6px;margin-bottom:4px;margin-top:12px}
label:first-child{margin-top:0}
input,select{width:100%;background:#F5F3EE;border:.5px solid #ddd;border-radius:8px;padding:10px 12px;font-size:15px;color:#1B3A5C;font-family:Inter,sans-serif;outline:none}
input:focus,select:focus{border-color:#1B3A5C}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.res{background:#1B3A5C;border-radius:10px;padding:14px;margin-top:12px;display:none}
.rr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.rr:last-child{border-top:1px solid rgba(201,168,76,.3);margin-top:6px;padding-top:6px;margin-bottom:0}
.rl{font-size:10px;color:#C9A84C;font-weight:700;letter-spacing:.5px}
.rv{font-family:Lora,serif;font-size:15px;color:#fff;font-weight:600}
.btn{width:100%;padding:12px;border-radius:10px;border:none;background:#C9A84C;color:#1B3A5C;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:10px}
.bto{background:transparent;border:1px solid #C9A84C;color:#1B3A5C}
.stabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.stab{padding:5px 12px;border-radius:20px;border:.5px solid #ddd;font-size:11px;font-weight:600;color:#aaa;background:#fff;cursor:pointer}
.stab.on{background:#1B3A5C;color:#C9A84C;border-color:#1B3A5C}
.obox{background:linear-gradient(135deg,#1B3A5C,#0d1b2a);border-radius:14px;padding:18px;text-align:center;margin-top:12px;display:none}
.ol{color:#C9A84C;font-size:11px;font-weight:700;letter-spacing:.8px}
.ov{font-family:Lora,serif;color:#fff;font-size:2rem;margin-top:4px}
.os{color:rgba(255,255,255,.4);font-size:11px;margin-top:4px}
.fpar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.fsl{aspect-ratio:1;border-radius:10px;border:2px dashed #ddd;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;background:#fff}
.fsl img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;display:none}
</style>
</head>
<body>
<div id="loginOverlay">
  <div id="loginBox">
    <h2>Pintor Pro</h2>

    <button class="bg" onclick="loginGoogle()">

      Entrar com Google
    </button>
    <div id="lmsg"></div>

</div>

  <div class="pg" id="pg2">

    <button class="btn" onclick="wLista()">Enviar lista por WhatsApp</button>
    </div>
  </div>
  <div class="pg" id="pg3">
    <div class="card"><div class="ct">Orcamento Rapido</div>
    <label>Cliente</label><input id="ocli" type="text" placeholder="Nome do cliente">
    <label>Area total (m2)</label><input id="oa" type="number" value="80" oninput="cO()">
    <div class="r2"><div><label>Mao de obra R$/m2</label><input id="omo" type="number" value="25" oninput="cO()"></div><div><label>Material (R$)</label><input id="omat" type="number" value="800" oninput="cO()"></div></div>
    <label>Lucro</label><select id="oluc" onchange="cO()"><option value="10">10%</option><option value="15">15%</option><option value="20" selected>20%</option><option value="25">25%</option><option value="30">30%</option></select>

    <div class="obox" id="ob"><div class="ol">TOTAL DO SERVICO</div><div class="ov" id="ov">R$ 0</div><div class="os" id="os2"></div></div>
    <div class="res" id="or"></div>
    <button class="btn" onclick="wOrc()" style="margin-top:10px">Enviar por WhatsApp</button>
    </div>
  </div>
  <div class="pg" id="pg4">
    <div class="card"><div class="ct">Registro do Servico</div>
    <label>Comodo / Local</label><input id="fcom" type="text" placeholder="Ex: Sala, quarto, fachada...">
    <div class="fpar">
      <div><div style="font-size:10px;font-weight:700;color:#aaa;margin-bottom:6px">ANTES</div>
        <label for="fan" class="fsl"><img id="fan_i"><div id="fan_p" style="text-align:center;padding:8px"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 0 2-2l2-2h8l2 2h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg><div style="font-size:10px;color:#ccc;margin-top:4px">foto antes</div></div></label>
        <input type="file" id="fan" accept="image/*" capture="environment" style="display:none" onchange="pf(this,'fan')">
      </div>
      <div><div style="font-size:10px;font-weight:700;color:#aaa;margin-bottom:6px">DEPOIS</div>
        <label for="fdp" class="fsl"><img id="fdp_i"><div id="fdp_p" style="text-align:center;padding:8px"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 0 2-2l2-2h8l2 2h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg><div style="font-size:10px;color:#ccc;margin-top:4px">foto depois</div></div></label>
        <input type="file" id="fdp" accept="image/*" capture="environment" style="display:none" onchange="pf(this,'fdp')">
      </div>
    </div>
    <button class="btn" onclick="sReg()" style="margin-top:12px">Salvar registro</button>
    </div>
    <div id="regs"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

function goTab(i,b){document.querySelectorAll(".pg").forEach(function(p,j){p.classList.toggle("on",j===i);});document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("on");});b.classList.add("on");}
var _tm=0,_mm=0;
var _cms=[{n:"Sala",l:5,a:3,d:4}];

function cO(){var a=g("oa")||80,mo=g("omo")||25,mat=g("omat")||800;var luc=parseFloat(document.getElementById("oluc").value)||20;var mO=a*mo,sub=mO+mat,lV=sub*luc/100,tot=sub+lV;var b=document.getElementById("ob");if(b)b.style.display="block";var ev=document.getElementById("ov");if(ev)ev.textContent=brl(tot);var es=document.getElementById("os2");if(es)es.textContent="M.O: "+brl(mO)+" | Mat: "+brl(mat)+" | Lucro: "+brl(lV);sRes("or",[["MAO DE OBRA",brl(mO)],["MATERIAL",brl(mat)],["LUCRO ("+luc+"%)",brl(lV)],["TOTAL",brl(tot)]]);}
function wOrc(){var cli=document.getElementById("ocli").value||"Cliente";var a=g("oa"),mo=g("omo"),mat=g("omat"),pz=g("opz");var luc=parseFloat(document.getElementById("oluc").value)||20;var tot=(a*mo+mat)*(1+luc/100);var txt="Orcamento de Pintura\n\nCliente: "+cli+"\nArea: "+a+" m2\nPrazo: "+pz+" dias\nMao de obra: "+brl(a*mo)+"\nMaterial: "+brl(mat)+"\n\nTOTAL: "+brl(tot)+"\n\nPintor Pro - Montgomery";if(navigator.share)navigator.share({text:txt});else window.open("https://wa.me/?text="+encodeURIComponent(txt));}
function pf(inp,pfx){if(!inp.files||!inp.files[0])return;var r=new FileReader();r.onload=function(e){var i=document.getElementById(pfx+"_i");var p=document.getElementById(pfx+"_p");if(i){i.src=e.target.result;i.style.display="block";}if(p)p.style.display="none";};r.readAsDataURL(inp.files[0]);}
function sReg(){var ai=document.getElementById("fan_i");if(!ai||ai.style.display==="none"){alert("Adicione a foto ANTES");return;}var di=document.getElementById("fdp_i");var com=document.getElementById("fcom").value||"Sem nome";_rgs.push({c:com,a:ai.src,d:di&&di.style.display!=="none"?di.src:null,dt:new Date().toLocaleDateString("pt-BR")});ai.style.display="none";ai.src="";document.getElementById("fan_p").style.display="flex";if(di){di.style.display="none";di.src="";document.getElementById("fdp_p").style.display="flex";}document.getElementById("fcom").value="";rRgs();}
function rRgs(){var el=document.getElementById("regs");if(!el)return;el.innerHTML=_rgs.slice().reverse().map(function(r){return "<div style=background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;border:.5px solid #e8e4dc><div style=font-size:13px;font-weight:700;color:#1B3A5C;margin-bottom:8px>"+r.c+" <span style=color:#aaa;font-weight:400;font-size:11px>"+r.dt+"</span></div><div style=display:grid;grid-template-columns:1fr 1fr;gap:8px><div><div style=font-size:9px;color:#aaa;margin-bottom:4px>ANTES</div><img src="+r.a+" style=width:100%;border-radius:8px;aspect-ratio:1;object-fit:cover></div>"+(r.d?"<div><div style=font-size:9px;color:#aaa;margin-bottom:4px>DEPOIS</div><img src="+r.d+" style=width:100%;border-radius:8px;aspect-ratio:1;object-fit:cover></div>":"<div style=background:#F5F3EE;border-radius:8px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:11px;color:#ccc>sem foto depois</div>")+"</div></div>";}).join("");}
