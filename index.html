<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MMObras">
<meta name="theme-color" content="#1B3A5C">
<title>MMObras</title>
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:#F5F3EE;color:#1A1918;font-size:15px;line-height:1.5;min-height:100vh}
header{background:#1B3A5C;padding:14px 16px 12px;position:sticky;top:0;z-index:10}
header h1{font-family:'Lora',serif;font-size:20px;font-weight:600;color:#fff;letter-spacing:-0.2px}
header p{font-size:12px;color:rgba(255,255,255,0.6);margin-top:3px}
.hbtns{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.hbtn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:7px;padding:8px 10px;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:'Inter',sans-serif;flex:1;justify-content:center}
.hbtn:active{background:rgba(255,255,255,0.25)}
.import-inp{display:none}
.main{padding:16px 14px;max-width:480px;margin:0 auto}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.metric{background:#fff;border:1px solid #E8E5DF;border-radius:10px;padding:12px 10px}
.metric-label{font-size:10px;color:#8A8680;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px;font-weight:500}
.metric-value{font-size:16px;font-weight:600;color:#1A1918;font-family:'Lora',serif}
.metric-value.accent{color:#1B3A5C}
.section{background:#fff;border:1px solid #E8E5DF;border-radius:12px;margin-bottom:14px;overflow:hidden}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #EDEAE4;background:#FAFAF8}
.sec-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.09em;color:#8A8680;display:flex;align-items:center;gap:6px}
.sec-sub{font-size:14px;font-weight:600;color:#1A1918;font-family:'Lora',serif}
.day-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#B0ADA8;padding:9px 16px 5px;background:#F8F6F2;border-bottom:1px solid #EDEAE4}
.item{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #F0EDE8;gap:10px}
.item:last-of-type{border-bottom:none}
.item-desc{font-size:14px;font-weight:500;color:#1A1918}
.item-obs{font-size:12px;color:#A8A5A0;margin-top:2px;word-break:break-word}
.item-right{display:flex;align-items:center;gap:2px;flex-shrink:0}
.item-val{font-size:14px;font-weight:600;color:#1B3A5C;font-family:'Lora',serif;margin-right:6px;white-space:nowrap}
.btic{background:none;border:none;cursor:pointer;padding:7px;border-radius:7px;display:flex;align-items:center;justify-content:center;min-width:36px;min-height:36px;color:#C0BDB8}
.btic:active{background:#F5F3EE;color:#1A1918}
.add-form{padding:14px 16px;background:#F8F6F2;border-top:1px solid #EDEAE4;display:flex;flex-direction:column;gap:10px}
.frow{display:grid;grid-template-columns:1fr 115px;gap:8px}
input,textarea{background:#fff;border:1px solid #DDD9D2;border-radius:8px;padding:10px 12px;font-size:14px;color:#1A1918;font-family:'Inter',sans-serif;width:100%;outline:none;-webkit-appearance:none;appearance:none}
input:focus,textarea:focus{border-color:#1B3A5C;box-shadow:0 0 0 3px rgba(27,58,92,0.1)}
input[type=date]{font-size:13px}
textarea{resize:none;height:52px;font-size:13px}
.btn-add{background:#1B3A5C;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;width:100%;font-family:'Inter',sans-serif}
.btn-add:active{opacity:0.85}
.empty{text-align:center;padding:22px;color:#B0ADA8;font-size:13px}
.overlay{display:none;position:fixed;inset:0;background:rgba(10,15,25,0.55);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:480px;padding-bottom:env(safe-area-inset-bottom,16px);max-height:92vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 14px;border-bottom:1px solid #EDEAE4;position:sticky;top:0;background:#fff;z-index:1}
.modal-head h2{font-family:'Lora',serif;font-size:17px;font-weight:600}
.modal-body{padding:18px;display:flex;flex-direction:column;gap:14px}
.modal-body label{font-size:11px;font-weight:600;color:#8A8680;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;display:block}
.mrow2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-foot{display:flex;gap:8px;padding:14px 18px;border-top:1px solid #EDEAE4}
.btn-save{flex:1;background:#1B3A5C;color:#fff;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn-cancel{background:none;border:1px solid #DDD9D2;border-radius:8px;padding:13px 16px;font-size:14px;cursor:pointer;color:#8A8680;font-family:'Inter',sans-serif}
.share-pre{background:#F8F6F2;border:1px solid #E8E5DF;border-radius:8px;padding:14px;font-size:12px;line-height:1.8;white-space:pre-wrap;word-break:break-word;max-height:280px;overflow-y:auto}
.btn-wa{background:#25A244;color:#fff;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Inter',sans-serif;margin-bottom:8px}
.btn-copy{background:none;border:1px solid #DDD9D2;border-radius:8px;padding:13px;font-size:14px;cursor:pointer;color:#1A1918;width:100%;font-weight:500;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
footer{text-align:center;font-size:11px;color:#C0BDB8;padding:14px 12px 40px;font-style:italic;font-family:'Lora',serif}
</style>
</head>
<body>

<header>
  <h1 id="hd-nome">MMObras</h1>
  <p id="hd-sub">&nbsp;</p>
  <div class="hbtns">
    <button class="hbtn" onclick="exportData()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Backup
    </button>
    <label class="hbtn" style="cursor:pointer">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <input type="file" class="import-inp" accept=".json" onchange="importData(event)">
      Restaurar
    </label>
    <button class="hbtn" onclick="openModal('ov-share')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Resumo
    </button>
    <button class="hbtn" onclick="openModal('ov-config')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Obra
    </button>
  </div>
</header>

<div class="main">
  <div class="metrics">
    <div class="metric"><div class="metric-label">Mo. Obra</div><div class="metric-value" id="m-mo">—</div></div>
    <div class="metric"><div class="metric-label">Materiais</div><div class="metric-value" id="m-mat">—</div></div>
    <div class="metric"><div class="metric-label">Total</div><div class="metric-value accent" id="m-total">—</div></div>
  </div>

  <div class="section">
    <div class="sec-head">
      <span class="sec-title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
        Mao de obra
      </span>
      <span class="sec-sub" id="st-mo"></span>
    </div>
    <div id="list-mo"></div>
    <div class="add-form">
      <div class="frow">
        <input type="text" id="mo-desc" placeholder="Ex: 1 ambiente — sala">
        <input type="number" id="mo-val" placeholder="Valor R$" step="0.01" inputmode="decimal">
      </div>
      <div class="frow">
        <textarea id="mo-obs" placeholder="Observacao (opcional)" style="height:44px"></textarea>
        <input type="date" id="mo-date">
      </div>
      <button class="btn-add" onclick="addItem('mo')">Adicionar</button>
    </div>
  </div>

  <div class="section">
    <div class="sec-head">
      <span class="sec-title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        Materiais
      </span>
      <span class="sec-sub" id="st-mat"></span>
    </div>
    <div id="list-mat"></div>
    <div class="add-form">
      <div class="frow">
        <input type="text" id="mat-desc" placeholder="Ex: Tinta Coral Rende Mais">
        <input type="number" id="mat-val" placeholder="Valor R$" step="0.01" inputmode="decimal">
      </div>
      <div class="frow">
        <textarea id="mat-obs" placeholder="Marca, cor, quantidade..." style="height:44px"></textarea>
        <input type="date" id="mat-date">
      </div>
      <button class="btn-add" onclick="addItem('mat')">Adicionar</button>
    </div>
  </div>
</div>

<footer>Montgomery Saude Integrada</footer>

<!-- Modal editar item -->
<div class="overlay" id="ov-item">
  <div class="modal">
    <div class="modal-head">
      <h2>Editar item</h2>
      <button class="btic" onclick="closeModal('ov-item')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div><label>Descricao</label><input type="text" id="edit-desc"></div>
      <div class="mrow2">
        <div><label>Valor (R$)</label><input type="number" id="edit-val" step="0.01" inputmode="decimal"></div>
        <div><label>Data</label><input type="date" id="edit-date"></div>
      </div>
      <div><label>Observacao</label><textarea id="edit-obs" placeholder="Marca, cor, quantidade..."></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal('ov-item')">Cancelar</button>
      <button class="btn-save" onclick="saveEdit()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal configurar obra -->
<div class="overlay" id="ov-config">
  <div class="modal">
    <div class="modal-head">
      <h2>Dados da obra</h2>
      <button class="btic" onclick="closeModal('ov-config')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div><label>Nome da obra</label><input type="text" id="cfg-nome" placeholder="Ex: Pintura sala principal"></div>
      <div><label>Empreiteiro</label><input type="text" id="cfg-empr" placeholder="Nome do empreiteiro"></div>
      <div><label>Equipe</label><input type="text" id="cfg-equipe" placeholder="Ex: Mateus, Sinval"></div>
      <div><label>Local</label><input type="text" id="cfg-local" placeholder="Ex: Sala e corredor"></div>
      <div class="mrow2">
        <div><label>Data inicio</label><input type="date" id="cfg-ini"></div>
        <div><label>Previsao fim</label><input type="date" id="cfg-fim"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal('ov-config')">Cancelar</button>
      <button class="btn-save" onclick="saveConfig()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal resumo -->
<div class="overlay" id="ov-share">
  <div class="modal">
    <div class="modal-head">
      <h2>Resumo da obra</h2>
      <button class="btic" onclick="closeModal('ov-share')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="share-pre" id="share-txt"></div>
      <button class="btn-wa" onclick="shareWA()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.6 3.38 2 2 0 0 1 3.59 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        Enviar pelo WhatsApp
      </button>
      <button class="btn-copy" id="btn-copy" onclick="copyTxt()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copiar texto
      </button>
    </div>
  </div>
</div>

<script>
// ── Utilitários ──────────────────────────────────────
function uid(){return Math.random().toString(36).slice(2,9)}
function todayISO(){return new Date().toISOString().slice(0,10)}
function isoToBR(s){if(!s)return '—';var p=s.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:'—'}
function brToISO(s){if(!s||s==='—')return '';var p=s.split('/');return p.length===3?p[2]+'-'+p[1]+'-'+p[0]:''}
function fmt(v){return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── Persistência ─────────────────────────────────────
var KEY='mmobras_v1';

function migrate(){
  var keys=['obra_ctrl_v5','obra_ctrl_v4','obra_ctrl_v3','obra_pintura_v2','obra_pintura_adames_v1','obra_pintura_adames'];
  for(var i=0;i<keys.length;i++){
    var raw=localStorage.getItem(keys[i]);
    if(!raw)continue;
    try{
      var d=JSON.parse(raw);
      if(!d.mo||!d.mat)continue;
      d.mo.forEach(function(x){if(x.day&&!x.date)x.date=brToISO(x.day)});
      d.mat.forEach(function(x){if(x.day&&!x.date)x.date=brToISO(x.day)});
      if(!d.config)d.config={};
      if(d.config.data&&!d.config.dataIni)d.config.dataIni=d.config.data;
      if(!d.config.dataFim)d.config.dataFim='';
      return d;
    }catch(e){}
  }
  return null;
}

function defaultDb(){
  return {
    config:{nome:'Obra — Pintura',empreiteiro:'Adames',equipe:'Mateus, Sinval',local:'',dataIni:'2025-06-23',dataFim:''},
    mo:[{id:uid(),desc:'1 ambiente',val:900,obs:'',date:'2025-06-23'}],
    mat:[
      {id:uid(),desc:'Tinta',val:295,obs:'',date:'2025-06-23'},
      {id:uid(),desc:'2 Fitas crepe',val:25,obs:'',date:'2025-06-23'},
      {id:uid(),desc:'Lona 8,20m',val:53,obs:'',date:'2025-06-23'}
    ]
  };
}

var db;
try{db=JSON.parse(localStorage.getItem(KEY))}catch(e){db=null}
if(!db)db=migrate();
if(!db)db=defaultDb();
save();

function save(){try{localStorage.setItem(KEY,JSON.stringify(db))}catch(e){}}

// ── Modais ────────────────────────────────────────────
function openModal(id){
  if(id==='ov-config')fillConfig();
  if(id==='ov-share')fillShare();
  document.getElementById(id).classList.add('open');
}
function closeModal(id){document.getElementById(id).classList.remove('open')}

// Fechar ao clicar fora
document.addEventListener('click',function(e){
  ['ov-item','ov-config','ov-share'].forEach(function(id){
    var el=document.getElementById(id);
    if(e.target===el)el.classList.remove('open');
  });
});

// ── Config ────────────────────────────────────────────
function fillConfig(){
  var c=db.config;
  document.getElementById('cfg-nome').value=c.nome||'';
  document.getElementById('cfg-empr').value=c.empreiteiro||'';
  document.getElementById('cfg-equipe').value=c.equipe||'';
  document.getElementById('cfg-local').value=c.local||'';
  document.getElementById('cfg-ini').value=c.dataIni||'';
  document.getElementById('cfg-fim').value=c.dataFim||'';
}
function saveConfig(){
  db.config={
    nome:document.getElementById('cfg-nome').value.trim()||'Obra',
    empreiteiro:document.getElementById('cfg-empr').value.trim(),
    equipe:document.getElementById('cfg-equipe').value.trim(),
    local:document.getElementById('cfg-local').value.trim(),
    dataIni:document.getElementById('cfg-ini').value,
    dataFim:document.getElementById('cfg-fim').value
  };
  save();render();closeModal('ov-config');
}

// ── Itens ─────────────────────────────────────────────
var editing=null;

function addItem(type){
  var desc=document.getElementById(type+'-desc').value.trim();
  var val=parseFloat(document.getElementById(type+'-val').value);
  var obs=document.getElementById(type+'-obs').value.trim();
  var date=document.getElementById(type+'-date').value||todayISO();
  if(!desc||isNaN(val)||val<0)return;
  db[type].push({id:uid(),desc:desc,val:val,obs:obs,date:date});
  save();render();
  document.getElementById(type+'-desc').value='';
  document.getElementById(type+'-val').value='';
  document.getElementById(type+'-obs').value='';
  document.getElementById(type+'-date').value=todayISO();
}

function openEdit(type,id){
  var item=db[type].find(function(i){return i.id===id});
  if(!item)return;
  editing={type:type,id:id};
  document.getElementById('edit-desc').value=item.desc;
  document.getElementById('edit-val').value=item.val;
  document.getElementById('edit-obs').value=item.obs||'';
  document.getElementById('edit-date').value=item.date||todayISO();
  openModal('ov-item');
}
function saveEdit(){
  if(!editing)return;
  var desc=document.getElementById('edit-desc').value.trim();
  var val=parseFloat(document.getElementById('edit-val').value);
  var obs=document.getElementById('edit-obs').value.trim();
  var date=document.getElementById('edit-date').value||todayISO();
  if(!desc||isNaN(val))return;
  var item=db[editing.type].find(function(i){return i.id===editing.id});
  if(item){item.desc=desc;item.val=val;item.obs=obs;item.date=date;}
  save();render();closeModal('ov-item');editing=null;
}
function removeItem(type,id){
  if(!confirm('Remover este item?'))return;
  db[type]=db[type].filter(function(i){return i.id!==id});
  save();render();
}

// ── Backup ────────────────────────────────────────────
function exportData(){
  var now=new Date();
  var stamp=now.toLocaleDateString('pt-BR').replace(/\//g,'-')+'_'+now.toLocaleTimeString('pt-BR').slice(0,5).replace(':','-');
  var blob=new Blob([JSON.stringify({version:2,exportedAt:now.toISOString(),data:db},null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='mmobras_backup_'+stamp+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
function importData(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var p=JSON.parse(ev.target.result);
      var restored=p.data||p;
      if(!restored.mo||!restored.mat)return alert('Arquivo inválido.');
      if(!confirm('Restaurar este backup?\nDados atuais serão substituídos.'))return;
      db=restored;save();render();alert('Backup restaurado!');
    }catch(err){alert('Erro: '+err.message);}
    e.target.value='';
  };
  reader.readAsText(file);
}

// ── Resumo / Share ────────────────────────────────────
function buildResumo(){
  var c=db.config;
  var mo=db.mo.reduce(function(s,i){return s+Number(i.val)},0);
  var mat=db.mat.reduce(function(s,i){return s+Number(i.val)},0);
  var L=[];
  // Header
  L.push('🏠 '+(c.nome||'Obra'));
  var meta=[];
  if(c.empreiteiro&&c.equipe)meta.push('Empreiteiro: '+c.empreiteiro+' | Equipe: '+c.equipe);
  else if(c.empreiteiro)meta.push('Empreiteiro: '+c.empreiteiro);
  else if(c.equipe)meta.push('Equipe: '+c.equipe);
  var meta2=[];
  if(c.local)meta2.push('Local: '+c.local);
  if(c.dataIni)meta2.push('Inicio: '+isoToBR(c.dataIni));
  if(meta.length)L.push(meta.join(''));
  if(meta2.length)L.push(meta2.join(' | '));
  // Mao de obra
  L.push('');
  L.push('🔨 Mao de obra: '+fmt(mo));
  var sorted_mo=db.mo.slice().sort(function(a,b){return (a.date||'').localeCompare(b.date||'')});
  var lastDay='';
  sorted_mo.forEach(function(i){
    if(i.date!==lastDay){L.push('  '+isoToBR(i.date));lastDay=i.date;}
    L.push('  • '+i.desc+' — '+fmt(i.val)+(i.obs?' ('+i.obs+')':''));
  });
  // Materiais
  L.push('');
  L.push('🛒 Materiais: '+fmt(mat));
  var sorted_mat=db.mat.slice().sort(function(a,b){return (a.date||'').localeCompare(b.date||'')});
  lastDay='';
  sorted_mat.forEach(function(i){
    if(i.date!==lastDay){L.push('  '+isoToBR(i.date));lastDay=i.date;}
    L.push('  • '+i.desc+' — '+fmt(i.val)+(i.obs?' ('+i.obs+')':''));
  });
  L.push('');
  L.push('💰 Total geral: '+fmt(mo+mat));
  return L.join('\n');
}
function fillShare(){document.getElementById('share-txt').textContent=buildResumo();}
function shareWA(){window.open('https://api.whatsapp.com/send?text='+encodeURIComponent(buildResumo()),'_blank')}
function copyTxt(){
  var btn=document.getElementById('btn-copy');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(buildResumo()).then(function(){
      btn.textContent='Copiado!';setTimeout(function(){btn.textContent='Copiar texto'},2000);
    });
  }
}

// ── Render ────────────────────────────────────────────
var SVG_EDIT='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
var SVG_DEL='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';

function render(){
  var c=db.config;
  document.getElementById('hd-nome').textContent=c.nome||'MMObras';
  var sub=[];
  if(c.empreiteiro)sub.push('Empreiteiro: '+c.empreiteiro);
  if(c.equipe)sub.push(c.equipe);
  if(c.local)sub.push(c.local);
  document.getElementById('hd-sub').textContent=sub.join(' · ')||' ';
  document.title=c.nome||'MMObras';

  var mo=db.mo.reduce(function(s,i){return s+Number(i.val)},0);
  var mat=db.mat.reduce(function(s,i){return s+Number(i.val)},0);
  document.getElementById('m-mo').textContent=fmt(mo);
  document.getElementById('m-mat').textContent=fmt(mat);
  document.getElementById('m-total').textContent=fmt(mo+mat);
  document.getElementById('st-mo').textContent=fmt(mo);
  document.getElementById('st-mat').textContent=fmt(mat);
  renderList('mo');
  renderList('mat');
}

function renderList(type){
  var el=document.getElementById('list-'+type);
  var items=db[type];
  if(!items.length){el.innerHTML='<div class="empty">Nenhum item adicionado</div>';return}
  var sorted=items.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'')});
  var groups={};var order=[];
  sorted.forEach(function(item){
    var d=item.date||'';
    if(!groups[d]){groups[d]=[];order.push(d)}
    groups[d].push(item);
  });
  var html='';
  order.forEach(function(date){
    html+='<div class="day-lbl">'+esc(isoToBR(date))+'</div>';
    groups[date].forEach(function(item){
      html+='<div class="item">'+
        '<div style="flex:1;min-width:0">'+
          '<div class="item-desc">'+esc(item.desc)+'</div>'+
          (item.obs?'<div class="item-obs">'+esc(item.obs)+'</div>':'')+
        '</div>'+
        '<div class="item-right">'+
          '<span class="item-val">'+fmt(item.val)+'</span>'+
          '<button class="btic" onclick="openEdit(\''+type+'\',\''+item.id+'\')">'+SVG_EDIT+'</button>'+
          '<button class="btic" onclick="removeItem(\''+type+'\',\''+item.id+'\')">'+SVG_DEL+'</button>'+
        '</div>'+
      '</div>';
    });
  });
  el.innerHTML=html;
}

// Init
document.getElementById('mo-date').value=todayISO();
document.getElementById('mat-date').value=todayISO();
render();
</script>
