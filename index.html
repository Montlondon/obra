<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MMObras">
<meta name="theme-color" content="#1B3A5C">
<title>MMObras</title>
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%231B3A5C' rx='32'/%3E%3Ctext x='90' y='100' text-anchor='middle' font-family='Georgia,serif' font-size='52' font-weight='600' fill='%23F5F3EE'%3EMM%3C/text%3E%3Ctext x='90' y='122' text-anchor='middle' font-family='Arial,sans-serif' font-size='16' fill='%23C4A84A' letter-spacing='4'%3EOBRAS%3C/text%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:#F5F3EE;color:#1A1918;font-size:15px;line-height:1.5;min-height:100vh;padding-bottom:72px}

/* HEADER */
header{background:#1B3A5C;padding:10px 16px;position:sticky;top:0;z-index:50;border-bottom:2px solid #C9A84C;display:flex;align-items:center;justify-content:space-between;gap:8px}
.hd-logo{font-family:'Lora',serif;font-size:20px;font-weight:600;color:#fff}
.hd-logo span{color:#C9A84C}
.hd-right{display:flex;gap:8px;align-items:center}
.hd-brt{font-size:11px;color:rgba(255,255,255,.6);text-align:right;line-height:1.3}
.hd-brt strong{color:#fff;font-size:13px;display:block}
.hd-icon-btn{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;padding:4px;display:flex;align-items:center}
.hd-icon-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* NAV TEMPORAL */
.nav-temp{background:#2C5282;padding:6px 14px;display:flex;align-items:center;gap:4px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid rgba(255,255,255,.08)}
.nav-temp::-webkit-scrollbar{display:none}
.nt-lv{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.3);margin-right:1px;white-space:nowrap}
.nt-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);color:rgba(255,255,255,.78);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:500;white-space:nowrap;cursor:pointer}
.nt-chip.on{background:#C9A84C;border-color:#C9A84C;color:#1B3A5C;font-weight:700}
.nt-sep{color:rgba(255,255,255,.2);font-size:11px;padding:0 1px}

/* ABAS */
.tab-bar{background:#fff;border-bottom:1px solid #D4D9DF;display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:60px;z-index:40}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{display:flex;align-items:center;gap:5px;padding:9px 13px;font-size:12px;font-weight:500;color:#8A9BAC;border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif}
.tab-btn.on{color:#1B3A5C;border-bottom-color:#C9A84C;font-weight:600}
.tab-btn .tv{background:#EAE7E0;color:#2C5282;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:600}
.tab-btn.on .tv{background:#C9A84C;color:#1B3A5C}

/* PAGES */
.page{display:none;padding:12px 14px 20px;max-width:500px;margin:0 auto}
.page.on{display:block}

/* SECTION LABEL */
.sl{font-size:9.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#8A9BAC;margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.sl::after{content:'';flex:1;height:1px;background:#D4D9DF}

/* SEARCH BAR */
.search-bar{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #D4D9DF;border-radius:10px;padding:8px 12px;margin-bottom:12px}
.search-bar svg{width:16px;height:16px;stroke:#8A9BAC;fill:none;stroke-width:2;flex-shrink:0}
.search-bar input{border:none;outline:none;font-size:14px;color:#1A1918;width:100%;font-family:'Inter',sans-serif;background:transparent}

/* RESUMO CARDS */
.rg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rc{background:#fff;border-radius:10px;border:1px solid #D4D9DF;padding:11px 13px}
.rc.full{grid-column:1/-1;background:#1B3A5C;border-color:#1B3A5C}
.rc .rl{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#8A9BAC;margin-bottom:3px}
.rc.full .rl{color:rgba(255,255,255,.5)}
.rc .rv{font-family:'Lora',serif;font-size:19px;font-weight:600;color:#1B3A5C}
.rc.full .rv{color:#C9A84C;font-size:22px}
.rc .rs{font-size:10px;color:#8A9BAC;margin-top:1px}
.rc.full .rs{color:rgba(255,255,255,.4)}
.rv.verde{color:#2E7D32!important}

/* FORNECEDOR CARD */
.fc{background:#fff;border:1px solid #D4D9DF;border-radius:12px;margin-bottom:8px;overflow:hidden}
.fc-head{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer}
.fc-av{width:38px;height:38px;border-radius:50%;background:#1B3A5C;color:#C9A84C;display:flex;align-items:center;justify-content:center;font-family:'Lora',serif;font-size:14px;font-weight:600;flex-shrink:0}
.fc-av.mat{background:#FFF3E0;color:#E65100}
.fc-av.alg{background:#E8F5E9;color:#2E7D32}
.fc-info{flex:1;min-width:0}
.fc-nome{font-size:13px;font-weight:600;color:#1B3A5C}
.fc-cat{font-size:10.5px;color:#8A9BAC;margin-top:1px}
.fc-saldo{text-align:right}
.fc-tot{font-family:'Lora',serif;font-size:14px;font-weight:600;color:#1B3A5C}
.fc-badges{display:flex;gap:3px;margin-top:3px;justify-content:flex-end;flex-wrap:wrap}
.fbg{font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;text-transform:uppercase}
.fbg.pg{background:#D4EDDA;color:#2E7D32}
.fbg.pd{background:#FFE0B2;color:#E65100}
.fbg.cr{background:#E3F2FD;color:#1565C0}
.fc-arr{color:#8A9BAC;flex-shrink:0}
.fc-arr svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}

/* FC BODY */
.fc-body{display:none;border-top:1px solid #EAE7E0}
.fc-body.on{display:block}

/* NF lida tag */
.nf-tag{display:flex;align-items:center;gap:8px;padding:7px 14px;background:#F0F7FF;border-bottom:1px solid #BBDEFB;font-size:11px;color:#1565C0}

/* Lançamento row */
.lrow{display:flex;align-items:flex-start;justify-content:space-between;padding:9px 14px;border-bottom:1px dashed #EAE7E0;gap:8px}
.lrow:last-child{border-bottom:none}
.lr-esq{flex:1;min-width:0}
.ln{font-size:12px;font-weight:500;color:#1A1918}
.ld{font-size:10px;color:#8A9BAC;margin-top:1px}
.lr-dir{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.lr-val{font-size:13px;font-weight:600;font-family:'Lora',serif;color:#1B3A5C}
.lr-val.verde{color:#2E7D32}
.lr-acoes{display:flex;gap:4px;margin-top:4px}
.sbg{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:7px;text-transform:uppercase;cursor:pointer}
.sbg.pg{background:#D4EDDA;color:#2E7D32}
.sbg.pd{background:#FFE0B2;color:#E65100}
.sbg.cr{background:#E3F2FD;color:#1565C0}
.sbg.din{background:#E8F5E9;color:#1B5E20}
.sbg.pix{background:#E3F2FD;color:#01579B}
.sbg.car{background:#F3E5F5;color:#6A1B9A}
.act-btn{background:none;border:none;cursor:pointer;padding:2px 5px;border-radius:5px;font-size:10px;color:#8A9BAC;font-family:'Inter',sans-serif}
.act-btn:hover{background:#EAE7E0}
.act-btn.del{color:#C0392B}

/* FC footer */
.fc-foot{display:flex;justify-content:space-between;padding:8px 14px;background:#F5F3EE;border-top:1px solid #D4D9DF}
.ff-b{display:flex;flex-direction:column;gap:2px}
.ff-b.r{text-align:right}
.ff-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#8A9BAC}
.ff-v{font-family:'Lora',serif;font-size:13px;font-weight:600}
.ff-v.pg{color:#2E7D32}
.ff-v.pd{color:#E65100}
.ff-v.cr{color:#1565C0}

/* FC ações */
.fc-acoes{display:flex;gap:6px;padding:8px 14px;border-top:1px solid #EAE7E0;background:#F9F8F6;flex-wrap:wrap}
.fac{flex:1;min-width:80px;display:flex;align-items:center;justify-content:center;gap:4px;background:#fff;border:1px solid #D4D9DF;border-radius:9px;padding:7px 4px;font-size:11px;font-weight:600;color:#1B3A5C;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap}
.fac svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.fac.wpp{background:#25D366;border-color:#25D366;color:#fff}
.fac.wpp svg{stroke:#fff}
.fac.red{background:#fee2e2;border-color:#fca5a5;color:#b91c1c}
.fac.red svg{stroke:#b91c1c}

/* ALUGUEL */
.pecas-hdr{display:grid;grid-template-columns:1fr 44px 64px 68px;gap:4px;padding:6px 14px;background:#F5F3EE;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#8A9BAC;border-bottom:1px solid #D4D9DF}
.pecas-hdr span:not(:first-child){text-align:right}
.peca-row{display:grid;grid-template-columns:1fr 44px 64px 68px;gap:4px;align-items:center;padding:7px 14px;border-bottom:1px solid #EAE7E0}
.pr-nome{font-size:12px;color:#1A1918}
.pr-qtd{font-size:13px;font-weight:700;color:#1B3A5C;text-align:right}
.pr-unit{font-size:11px;color:#8A9BAC;text-align:right}
.pr-tot{font-size:13px;font-weight:700;font-family:'Lora',serif;color:#1B3A5C;text-align:right}
.dias-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fff;border-top:1px solid #EAE7E0;gap:8px}
.db-ctrl{display:flex;align-items:center}
.db-btn{width:34px;height:34px;border:1px solid #D4D9DF;background:#fff;color:#1B3A5C;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif}
.db-btn:first-child{border-radius:8px 0 0 8px}
.db-btn:last-child{border-radius:0 8px 8px 0}
.db-num{width:42px;height:34px;border-top:1px solid #D4D9DF;border-bottom:1px solid #D4D9DF;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#1B3A5C;background:#fff}
.btn-dia{display:flex;align-items:center;justify-content:center;gap:8px;background:#1B3A5C;color:#fff;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;width:100%;font-family:'Inter',sans-serif}
.btn-dia span{color:#C9A84C;font-size:18px;font-weight:700}

/* LISTA ITEM */
.lista-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px dashed #EAE7E0;background:#fff}
.lista-item:last-child{border-bottom:none}
.li-check{width:20px;height:20px;border-radius:5px;border:2px solid #D4D9DF;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.li-check.done{background:#1B3A5C;border-color:#1B3A5C}
.li-check.done svg{display:block}
.li-check svg{display:none;width:12px;height:12px;stroke:#fff;fill:none;stroke-width:3}
.li-text{flex:1;font-size:13px;color:#1A1918}
.li-text.done{text-decoration:line-through;color:#8A9BAC}
.li-acoes{display:flex;gap:4px}

/* CALCULADORA */
.calc-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:8px}
.calc-tabs::-webkit-scrollbar{display:none}
.ctab{background:#fff;border:1px solid #D4D9DF;border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;color:#8A9BAC;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif}
.ctab.on{background:#1B3A5C;border-color:#1B3A5C;color:#fff}
.calc-panel{display:none;background:#fff;border-radius:12px;border:1px solid #D4D9DF;padding:16px;margin-bottom:8px}
.calc-panel.on{display:block}
.calc-result{background:#1B3A5C;border-radius:10px;padding:12px 14px;margin-top:12px;text-align:center}
.calc-result .cr-label{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.07em}
.calc-result .cr-val{font-family:'Lora',serif;font-size:22px;font-weight:600;color:#C9A84C;margin-top:2px}
.calc-result .cr-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.conv-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.conv-item{background:#F5F3EE;border-radius:8px;padding:8px 10px}
.conv-label{font-size:10px;color:#8A9BAC;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.conv-val{font-size:14px;font-weight:700;color:#1B3A5C;font-family:'Lora',serif;margin-top:2px}

/* NF BANNER */
.nf-banner{background:linear-gradient(135deg,#1B3A5C,#2C5282);border-radius:12px;border:1px dashed #C9A84C;padding:13px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;margin-bottom:12px}
.nf-icon{width:40px;height:40px;border-radius:10px;background:rgba(201,168,76,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nf-txt .t1{font-size:13px;font-weight:700;color:#fff}
.nf-txt .t2{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;line-height:1.4}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end;justify-content:center}
.modal.on{display:flex}
.mbox{background:#fff;border-radius:20px 20px 0 0;padding:20px 18px 36px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto}
.mtitle{font-family:'Lora',serif;font-size:17px;font-weight:600;color:#1B3A5C;margin-bottom:14px}
.mclose{float:right;background:none;border:none;font-size:24px;color:#8A9BAC;cursor:pointer;line-height:1;margin-top:-3px}
label{display:block;font-size:12px;font-weight:600;color:#8A9BAC;text-transform:uppercase;letter-spacing:.06em;margin:12px 0 4px}
input,select,textarea{width:100%;border:1px solid #D4D9DF;border-radius:9px;padding:10px 12px;font-size:14px;font-family:'Inter',sans-serif;color:#1A1918;background:#fff;outline:none}
input:focus,select:focus,textarea:focus{border-color:#1B3A5C}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn-p{display:block;width:100%;background:#1B3A5C;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:14px;text-align:center}
.btn-s{display:block;width:100%;background:#F5F3EE;color:#1B3A5C;border:1px solid #D4D9DF;border-radius:10px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px;text-align:center}
.btn-d{display:block;width:100%;background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5;border-radius:10px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px;text-align:center}
.tipo-pills{display:flex;gap:6px;margin-top:6px}
.tipo-pill{flex:1;padding:8px 4px;border:2px solid #D4D9DF;border-radius:10px;font-size:11px;font-weight:600;text-align:center;cursor:pointer;color:#8A9BAC;font-family:'Inter',sans-serif}
.tipo-pill.on{border-color:#1B3A5C;color:#1B3A5C;background:#EBF5FF}
.tipo-pill.on.alg{border-color:#2E7D32;color:#2E7D32;background:#E8F5E9}
.forma-pills{display:flex;gap:6px;margin-top:6px}
.forma-pill{flex:1;padding:7px 4px;border:2px solid #D4D9DF;border-radius:9px;font-size:11px;font-weight:600;text-align:center;cursor:pointer;color:#8A9BAC;font-family:'Inter',sans-serif}
.forma-pill.on{border-color:#1B3A5C;color:#1B3A5C;background:#EBF5FF}
.peca-inp-row{display:grid;grid-template-columns:1fr 52px 64px 28px;gap:5px;align-items:center;margin-bottom:6px}
.peca-inp-row input{padding:8px 10px;font-size:13px}
.del-peca{background:#fee2e2;border:none;border-radius:7px;width:28px;height:36px;cursor:pointer;color:#b91c1c;font-size:16px;display:flex;align-items:center;justify-content:center}

/* FAB */
.fab-wrap{position:fixed;bottom:68px;right:16px;display:flex;flex-direction:column;align-items:flex-end;gap:8px;z-index:50}
.fab{width:50px;height:50px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.22)}
.fab.main{background:#C9A84C;color:#1B3A5C}
.fab.cam{background:#2C5282;color:#C9A84C;border:2px solid #C9A84C;width:44px;height:44px}
.fab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.fab.cam svg{width:19px;height:19px}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #D4D9DF;display:flex;height:58px;z-index:50}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:#8A9BAC;font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;border:none;background:none;font-family:'Inter',sans-serif}
.bn.on{color:#1B3A5C}
.bn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* EMPTY */
.empty{text-align:center;padding:28px 20px;color:#8A9BAC;font-size:13px}
.empty svg{width:32px;height:32px;stroke:#D4D9DF;margin-bottom:8px;fill:none}

/* BACKUP BTNS */
.bkp-row{display:flex;gap:8px;margin-top:8px}
.bkp-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:#fff;border:1px solid #D4D9DF;border-radius:10px;padding:10px;font-size:12px;font-weight:600;color:#1B3A5C;cursor:pointer;font-family:'Inter',sans-serif}
.bkp-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}

/* RELATORIO */
.rel-forn-card{background:#fff;border:1px solid #D4D9DF;border-radius:10px;margin-bottom:8px;padding:12px 14px}
.rfc-nome{font-size:13px;font-weight:700;color:#1B3A5C;margin-bottom:6px}
.rfc-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px dashed #EAE7E0}
.rfc-row:last-child{border-bottom:none;font-weight:700;margin-top:4px;font-size:13px}
</style>
</head>
<body>

<header>
  <div class="hd-logo">MM<span>Obras</span></div>
  <div class="hd-right">
    <div class="hd-brt"><strong id="brt-h">--:--</strong><span id="brt-d"></span></div>
    <button class="hd-icon-btn" onclick="toggleBuscaBar()" title="Busca" id="btn-busca-hdr">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <button class="hd-icon-btn" onclick="doBackup()" title="Backup">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
  </div>
</header>

<div id="busca-bar-global" style="display:none;position:sticky;top:60px;z-index:60;background:#1B3A5C;padding:6px 14px;border-bottom:1px solid #C9A84C;">

<script>
var KEY='mmobras_v2';
var FORMAS=['dinheiro','pix','cartao'];
var listaAtual='todo';
var novoFornTipo='servico';
var novoFornForma='dinheiro';
var pecasForm=[];
var paredesForm=[];
var editFornId=null;
var editLancFid=null, editLancCid=null;
var editCredFid=null, editCredCid=null;
var editListaTipo=null, editListaId=null;

// ── Utilitários ──────────────────────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function todayISO(){return new Date().toISOString().slice(0,10)}
function isoToBR(s){if(!s)return '—';var p=s.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:'—'}
function fmt(v){return 'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function initials(n){var w=n.trim().split(' ');return w.length>=2?(w[0][0]+w[w.length-1][0]).toUpperCase():n.slice(0,2).toUpperCase()}
function formaBadge(f){
  if(f==='pix')return '<span class="sbg pix">Pix</span>';
  if(f==='cartao')return '<span class="sbg car">Cartão</span>';
  return '<span class="sbg din">💵</span>';
}

// ── BRT ──────────────────────────────────────────────────────────────────────
function brtNow(){return new Date(new Date().toLocaleString('en-US',{timeZone:'America/Sao_Paulo'}))}
function updateBRT(){
  var d=brtNow();
  var h=String(d.getHours()).padStart(2,'0'),m=String(d.getMinutes()).padStart(2,'0');
  var el=document.getElementById('brt-h');if(el)el.textContent=h+':'+m+' BRT';
  var dias=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'],meses=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  var el2=document.getElementById('brt-d');if(el2)el2.textContent=dias[d.getDay()]+' '+d.getDate()+' '+meses[d.getMonth()];
}

// ── Filtro Temporal ───────────────────────────────────────────────────────────
var filtro={ano:null,mes:null,sem:null,dia:null};

function buildNavTemp(){
  var now=brtNow();
  var anoAtual=now.getFullYear();
  var anos=[2025,2026].filter(function(a,i,ar){return ar.indexOf(a)===i}).sort();
  var meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  var html='<span class="nt-lv">Ano</span>';
  html+='<div class="nt-chip'+(filtro.ano===null?' on':'')+'" onclick="sf(\'ano\',null)">Todos</div>';
  anos.forEach(function(a){html+='<div class="nt-chip'+(filtro.ano===a?' on':'')+'" onclick="sf(\'ano\','+a+')">'+a+'</div>';});
  html+='<span class="nt-sep">›</span><span class="nt-lv">Mês</span>';
  html+='<div class="nt-chip'+(filtro.mes===null?' on':'')+'" onclick="sf(\'mes\',null)">Todos</div>';
  meses.forEach(function(m,i){html+='<div class="nt-chip'+(filtro.mes===i?' on':'')+'" onclick="sf(\'mes\','+i+')">'+m+'</div>';});
  if(filtro.mes!==null){
    var anoSem=filtro.ano!==null?filtro.ano:anoAtual;
    var sems=getSems(anoSem,filtro.mes);
    html+='<span class="nt-sep">›</span><span class="nt-lv">Sem</span>';
    html+='<div class="nt-chip'+(filtro.sem===null?' on':'')+'" onclick="sf(\'sem\',null)">Todas</div>';
    sems.forEach(function(s,i){html+='<div class="nt-chip'+(filtro.sem===i?' on':'')+'" onclick="sf(\'sem\','+i+')">S'+(i+1)+'</div>';});
    if(filtro.sem!==null){
      var sem=sems[filtro.sem];
      if(sem){
        html+='<span class="nt-sep">›</span><span class="nt-lv">Dia</span>';
        html+='<div class="nt-chip'+(filtro.dia===null?' on':'')+'" onclick="sf(\'dia\',null)">Todos</div>';
        var dd=new Date(sem.i+'T12:00:00'),fim=new Date(sem.f+'T12:00:00');
        var dn=['D','S','T','Q','Q','S','S'];
        while(dd<=fim){var iso=dd.toISOString().slice(0,10);html+='<div class="nt-chip'+(filtro.dia===iso?' on':'')+'" onclick="sf(\'dia\',\''+iso+'\')">'+dn[dd.getDay()]+' '+dd.getDate()+'</div>';dd.setDate(dd.getDate()+1);}
      }
    }
  }
  document.getElementById('navTemp').innerHTML=html;
}

function getSems(ano,mes){
  var sems=[],d=new Date(ano,mes,1),fim=new Date(ano,mes+1,0);
  while(d.getDay()!==1&&d<=fim)d.setDate(d.getDate()+1);
  while(d<=fim){var ini=new Date(d),f=new Date(d);f.setDate(f.getDate()+6);if(f>fim)f=new Date(fim);sems.push({i:ini.toISOString().slice(0,10),f:f.toISOString().slice(0,10)});d.setDate(d.getDate()+7);}
  if(!sems.length)sems.push({i:new Date(ano,mes,1).toISOString().slice(0,10),f:fim.toISOString().slice(0,10)});
  return sems;
}

function sf(campo,val){
  filtro[campo]=val;
  if(campo==='ano'||campo==='mes'){filtro.sem=null;filtro.dia=null;}
  if(campo==='sem')filtro.dia=null;
  buildNavTemp();renderAll();
}

function noFiltro(dateISO){
  if(!dateISO)return true;
  var d=new Date(dateISO+'T12:00:00');
  if(filtro.ano!==null&&d.getFullYear()!==filtro.ano)return false;
  if(filtro.mes!==null&&d.getMonth()!==filtro.mes)return false;
  if(filtro.sem!==null&&filtro.mes!==null){
    var anoS=filtro.ano!==null?filtro.ano:d.getFullYear();
    var sems=getSems(anoS,filtro.mes),s=sems[filtro.sem];
    if(s&&(dateISO<s.i||dateISO>s.f))return false;
  }
  if(filtro.dia!==null&&dateISO!==filtro.dia)return false;
  return true;
}

// ── Resumo ────────────────────────────────────────────────────────────────────
function calcTotalAluguel(f,l){
  if(!f.pecas||!f.pecas.length)return 0;
  var pd=f.pecas.reduce(function(a,p){return a+(p.qtd*p.valDia)},0);
  return pd*(l.dias||1);
}
function renderResumo(){
  var totMO=0,totMat=0,totAlg=0,totCred=0,totPago=0,totPend=0;
  (db.mo||[]).forEach(function(i){if(noFiltro(i.date))totMO+=i.val||0;});
  (db.mat||[]).forEach(function(i){if(noFiltro(i.date))totMat+=i.val||0;});
  (db.des||[]).forEach(function(i){if(noFiltro(i.date))totMat+=i.val||0;});
  db.fornecedores.forEach(function(f){
    (f.contas||[]).forEach(function(c){
      if(!noFiltro(c.date))return;
      if(f.tipo==='servico')totMO+=c.val||0;else totMat+=c.val||0;
      if(c.pago)totPago+=c.val||0;else totPend+=c.val||0;
    });
    (f.creditos||[]).forEach(function(c){if(noFiltro(c.date))totCred+=c.val||0;});
    (f.locacoes||[]).forEach(function(l){
      if(!noFiltro(l.dataInicio))return;
      var t=calcTotalAluguel(f,l);totAlg+=t;
      if(l.pago)totPago+=t;else totPend+=t;
    });
  });
  var total=totMO+totMat+totAlg;
  document.getElementById('resumo-cards').innerHTML=
    '<div class="rc"><div class="rl">Mão de Obra</div><div class="rv">'+fmt(totMO)+'</div></div>'+
    '<div class="rc"><div class="rl">Materiais</div><div class="rv">'+fmt(totMat)+'</div></div>'+
    '<div class="rc"><div class="rl">Locações</div><div class="rv">'+fmt(totAlg)+'</div></div>'+
    '<div class="rc"><div class="rl">Créditos/Sobras</div><div class="rv verde">'+fmt(totCred)+'</div></div>'+
    '<div class="rc full"><div class="rl">Total do período</div><div class="rv">'+fmt(total)+'</div>'+
    '<div class="rs">✅ Pago: '+fmt(totPago)+' · ⏳ Pendente: '+fmt(totPend)+'</div></div>';
}

        '<div class="db-ctrl"><button class="db-btn" onclick="chDias(\''+f.id+'\',\''+loc.id+'\',-1)">−</button><div class="db-num" id="dn-'+loc.id+'">'+loc.dias+'</div><button class="db-btn" onclick="chDias(\''+f.id+'\',\''+loc.id+'\',1)">+</button></div>'+
        '<div style="text-align:right"><div style="font-size:10px;color:#8A9BAC">Total</div><div style="font-family:Lora,serif;font-size:16px;font-weight:700;color:#E65100" id="dt-'+loc.id+'">'+fmt(totAcum)+'</div></div></div>'+
        '<div style="padding:8px 14px;border-top:1px solid #EAE7E0">'+
          '<button class="btn-dia" onclick="maisUmDia(\''+f.id+'\',\''+loc.id+'\')"><span>+</span> Mais um dia</button>'+
          '<div style="display:flex;gap:8px;margin-top:8px;align-items:center">'+
            '<span class="sbg '+(loc.pago?'pg':'pd')+'" onclick="tgPagoLoc(\''+f.id+'\',\''+loc.id+'\')" style="padding:6px 14px;font-size:11px">'+(loc.pago?'✅ Pago':'⏳ Pendente')+'</span>'+
            '<button onclick="encerrarLoc(\''+f.id+'\',\''+loc.id+'\')" style="background:none;border:1px solid #D4D9DF;border-radius:8px;padding:5px 10px;font-size:11px;color:#8A9BAC;cursor:pointer;font-family:Inter,sans-serif">Encerrar</button>'+
          '</div>'+
        '</div>';
    });
  } else {
    html+='<div style="padding:10px 14px"><button class="btn-dia" onclick="iniciarLoc(\''+f.id+'\')"><span>+</span> Iniciar locação</button></div>';
  }
  var locEnc=(f.locacoes||[]).filter(function(l){return l.encerrada});
  if(locEnc.length){
    html+='<div style="padding:6px 14px 3px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8A9BAC;border-top:1px solid #EAE7E0">Histórico</div>';
    locEnc.forEach(function(l){var tot=calcTotalAluguel(f,l);
      html+='<div class="lrow"><div class="lr-esq"><div class="ln">'+isoToBR(l.dataInicio)+' — '+l.dias+' dias</div></div>'+
        '<div class="lr-dir"><div class="lr-val">'+fmt(tot)+'</div><span class="sbg '+(l.pago?'pg':'pd')+'">'+(l.pago?'pago':'pend.')+'</span></div></div>';
    });
  }
  var totPago=0,totPend=0;
  (f.locacoes||[]).forEach(function(l){var t=calcTotalAluguel(f,l);if(l.pago)totPago+=t;else totPend+=t;});
  html+='<div class="fc-foot"><div class="ff-b"><div class="ff-l">Pago</div><div class="ff-v pg">'+fmt(totPago)+'</div></div><div class="ff-b r"><div class="ff-l">Pendente</div><div class="ff-v pd">'+fmt(totPend)+'</div></div></div>';
  return html;
}

// ── CALCULADORA ───────────────────────────────────────────────────────────────
function goCalc(nome,btn){
  document.querySelectorAll('.calc-panel').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.calc-tabs .ctab').forEach(function(b){b.classList.remove('on');});
  var el=document.getElementById('cp-'+nome);if(el)el.classList.add('on');
  if(btn)btn.classList.add('on');
  if(nome==='parede'&&!paredesForm.length){addParede();addParede();}
}
function showRes(id,html){var el=document.getElementById(id);if(el){el.style.display='block';el.innerHTML=html;}}
function calcTinta(){
  var l=+document.getElementById('t-larg').value,a=+document.getElementById('t-alt').value;
  var jan=+document.getElementById('t-jan').value||0,por=+document.getElementById('t-port').value||0;
  var dem=+document.getElementById('t-dem').value||2,rend=+document.getElementById('t-rend').value||10;
  if(!l||!a)return;
  var area=(l*a)-(jan+por);var litros=(area*dem)/rend;
  showRes('r-tinta','<div class="cr-label">Área líquida</div><div class="cr-val">'+area.toFixed(2)+' m²</div><div class="cr-sub">'+litros.toFixed(1)+' litros · '+Math.ceil(litros/18)+' latas 18L · '+Math.ceil(litros/3.6)+' latas 3.6L</div>');
}
function calcTelha(){
  var c=+document.getElementById('tl-comp').value,l=+document.getElementById('tl-larg').value;
  var pm2=+document.getElementById('tl-por-m2').value||16,qbr=+document.getElementById('tl-quebra').value||10;
  if(!c||!l)return;
  var area=c*l,telhas=Math.ceil(area*pm2*(1+qbr/100));
  showRes('r-telha','<div class="cr-label">Área do telhado</div><div class="cr-val">'+area.toFixed(2)+' m²</div><div class="cr-sub">'+telhas+' telhas (com '+qbr+'% quebra)</div>');
}
function calcTijolo(){
  var c=+document.getElementById('tj-comp').value,a=+document.getElementById('tj-alt').value;
  var desc=+document.getElementById('tj-desc').value||0,pm2=+document.getElementById('tj-por-m2').value||25;
  var qbr=+document.getElementById('tj-quebra').value||10;
  if(!c||!a)return;
  var area=(c*a)-desc,tijolos=Math.ceil(area*pm2*(1+qbr/100));
  showRes('r-tijolo','<div class="cr-label">Área de alvenaria</div><div class="cr-val">'+area.toFixed(2)+' m²</div><div class="cr-sub">'+tijolos+' tijolos (com '+qbr+'% quebra)</div>');
}
function calcArgamassa(){
  var area=+document.getElementById('ag-area').value,esp=+document.getElementById('ag-esp').value||20;
  if(!area)return;
  var vol=area*(esp/1000),sacos=Math.ceil(vol/0.02);
  showRes('r-argamassa','<div class="cr-label">Volume</div><div class="cr-val">'+vol.toFixed(3)+' m³</div><div class="cr-sub">≈ '+sacos+' sacos 20kg (espessura '+esp+'mm)</div>');
}
function calcCeramica(){
  var area=+document.getElementById('ce-area').value,tam=+document.getElementById('ce-tam').value||60;
  var qbr=+document.getElementById('ce-quebra').value||10;
  if(!area)return;
  var pecPorM2=Math.ceil(10000/(tam*tam)*10)/10,pecas=Math.ceil(area*pecPorM2*(1+qbr/100));
  var caixas=Math.ceil(pecas/(Math.floor(2/(tam/100*tam/100))||8));
  showRes('r-ceramica','<div class="cr-label">Peças necessárias</div><div class="cr-val">'+pecas+' peças</div><div class="cr-sub">≈ '+caixas+' caixas · '+pecPorM2.toFixed(1)+' pç/m²</div>');
}

  paredesForm.push({id:uid(),comp:0,alt:0,desc:0});

function renderParedesForm(){
  var el=document.getElementById('paredes-list');if(!el)return;
  el.innerHTML=paredesForm.map(function(p,i){
    return '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 28px;gap:5px;margin-bottom:6px;align-items:center">'+
      '<input type="number" placeholder="Comp(m)" value="'+(p.comp||'')+'" oninput="paredesForm['+i+'].comp=parseFloat(this.value)||0;calcParede()" style="padding:8px;font-size:13px;border:1px solid #D4D9DF;border-radius:8px">'+
      '<input type="number" placeholder="Alt(m)" value="'+(p.alt||'')+'" oninput="paredesForm['+i+'].alt=parseFloat(this.value)||0;calcParede()" style="padding:8px;font-size:13px;border:1px solid #D4D9DF;border-radius:8px">'+
      '<input type="number" placeholder="Desc(m²)" value="'+(p.desc||'')+'" oninput="paredesForm['+i+'].desc=parseFloat(this.value)||0;calcParede()" style="padding:8px;font-size:13px;border:1px solid #D4D9DF;border-radius:8px">'+
      '<button class="del-peca" onclick="paredesForm.splice('+i+',1);renderParedesForm();calcParede()">×</button>'+
    '</div>';
  }).join('');
}
function calcParede(){
  var total=paredesForm.reduce(function(a,p){return a+(p.comp*p.alt-(p.desc||0));},0);
  if(total>0)showRes('r-parede','<div class="cr-label">Área líquida total</div><div class="cr-val">'+total.toFixed(2)+' m²</div><div class="cr-sub">'+paredesForm.length+' paredes</div>');
}

// Conversões
var convUpdating=false;
function calcConv(src){
  if(convUpdating)return;convUpdating=true;
  var M2_PER_ALQ=48400,M2_PER_HA=10000,M2_PER_FT2=0.0929;
  var M_PER_IN=0.0254,M_PER_FT=0.3048,M_PER_CM=0.01;
  var KG_PER_LB=0.453592,KG_PER_AR=15,KG_PER_GR=0.001;
  var g=function(id){return parseFloat(document.getElementById(id).value)||0;};
  var s=function(id,v){document.getElementById(id).value=v?Number(v.toFixed(6)).toString():'';};
  var m2,m,kg;
  if(src==='m2')m2=g('cv-m2');else if(src==='alq')m2=g('cv-alq')*M2_PER_ALQ;
  else if(src==='ha')m2=g('cv-ha')*M2_PER_HA;else m2=g('cv-ft2')*M2_PER_FT2;
  if(['m2','alq','ha','ft2'].includes(src)){
    s('cv-m2',m2);s('cv-alq',m2/M2_PER_ALQ);s('cv-ha',m2/M2_PER_HA);s('cv-ft2',m2/M2_PER_FT2);
  }
  if(src==='m')m=g('cv-m');else if(src==='in')m=g('cv-in')*M_PER_IN;
  else if(src==='ft')m=g('cv-ft')*M_PER_FT;else if(src==='cm')m=g('cv-cm')*M_PER_CM;
  if(['m','in','ft','cm'].includes(src)){
    s('cv-m',m);s('cv-in',m/M_PER_IN);s('cv-ft',m/M_PER_FT);s('cv-cm',m/M_PER_CM);
  }
  if(src==='kg')kg=g('cv-kg');else if(src==='lb')kg=g('cv-lb')*KG_PER_LB;
  else if(src==='ar')kg=g('cv-ar')*KG_PER_AR;else if(src==='gr')kg=g('cv-gr')*KG_PER_GR;
  if(['kg','lb','ar','gr'].includes(src)){
    s('cv-kg',kg);s('cv-lb',kg/KG_PER_LB);s('cv-ar',kg/KG_PER_AR);s('cv-gr',kg/KG_PER_GR);
  }
  convUpdating=false;
}

// ── WhatsApp ──────────────────────────────────────────────────────────────────
function enviarWpp(fid){
  var f=db.fornecedores.find(function(x){return x.id===fid});if(!f)return;
  var msg='*MMObras — '+f.nome+'*\n_'+new Date().toLocaleDateString('pt-BR')+'_\n\n';
  if(f.tipo==='aluguel'){
    msg+='*Locação:*\n';
    (f.pecas||[]).forEach(function(p){msg+='• '+p.nome+' '+p.qtd+'pç × R$'+p.valDia.toFixed(2)+'/dia\n';});
    var td=(f.pecas||[]).reduce(function(a,p){return a+(p.qtd*p.valDia)},0);
    msg+='\nR$/dia: '+fmt(td)+'\n';
    (f.locacoes||[]).filter(function(l){return !l.encerrada}).forEach(function(l){
      msg+='Dias: '+l.dias+' | Total: '+fmt(td*l.dias)+'\nStatus: '+(l.pago?'✅ Pago':'⏳ Pendente')+'\n';
    });
  } else {
    var totPago=0,totPend=0;
    (f.contas||[]).forEach(function(c){
      msg+='• '+c.desc+' ('+isoToBR(c.date)+'): '+fmt(c.val)+' '+(c.pago?'✅':'⏳')+'\n';
      if(c.pago)totPago+=c.val;else totPend+=c.val;
    });
    msg+='\n✅ Pago: '+fmt(totPago)+'\n⏳ Pendente: '+fmt(totPend);
  }
  var tel=(f.tel||'').replace(/\D/g,'');
  window.open('https://wa.me/'+(tel?'55'+tel:'')+'?text='+encodeURIComponent(msg),'_blank');
}

function renderBusca(){
  var q=(document.getElementById('busca-input').value||'').toLowerCase().trim();

  if(!q){el.innerHTML='';return;}
  var res=[];
  db.fornecedores.forEach(function(f){

      res.push('<div class="lrow"><div class="lr-esq"><div class="ln">👤 '+esc(f.nome)+'</div><div class="ld">Fornecedor · '+esc(f.cat||f.tipo)+'</div></div></div>');
    (f.contas||[]).forEach(function(c){
      if(c.desc.toLowerCase().includes(q)||(c.obs||'').toLowerCase().includes(q))
        res.push('<div class="lrow"><div class="lr-esq"><div class="ln">'+esc(c.desc)+'</div><div class="ld">'+esc(f.nome)+' · '+isoToBR(c.date)+'</div></div><div class="lr-dir"><div class="lr-val">'+fmt(c.val)+'</div></div></div>');
    });
  });
  ['todo','pendencias','compras','sobras'].forEach(function(tipo){
    (db.listas[tipo]||[]).forEach(function(it){

    });
  });
  el.innerHTML=res.length?res.join(''):'<div class="empty" style="padding:20px">Nenhum resultado</div>';
}

// ── Relatório ─────────────────────────────────────────────────────────────────
function renderRelatorio(){
  var q=(document.getElementById('rel-search')||{value:''}).value.toLowerCase();
  var list=db.fornecedores.filter(function(f){
    if(!q)return true;
    if(f.nome.toLowerCase().includes(q))return true;
    if((f.cat||'').toLowerCase().includes(q))return true;
    if((f.tel||'').includes(q))return true;
    if((f.contas||[]).some(function(c){return (c.desc||'').toLowerCase().includes(q)||(c.obs||'').toLowerCase().includes(q);}))return true;
    return false;
  });
  var html='';
  var totGeral=0,totPagoGeral=0,totPendGeral=0;
  list.forEach(function(f){
    var totPago=0,totPend=0;
    (f.contas||[]).forEach(function(c){if(noFiltro(c.date)){if(c.pago)totPago+=c.val||0;else totPend+=c.val||0;}});
    (f.locacoes||[]).forEach(function(l){if(noFiltro(l.dataInicio)){var t=calcTotalAluguel(f,l);if(l.pago)totPago+=t;else totPend+=t;}});
    var tot=totPago+totPend;if(!tot)return;
    totGeral+=tot;totPagoGeral+=totPago;totPendGeral+=totPend;
    html+='<div class="rel-forn-card">'+
      '<div class="rfc-nome">'+esc(f.nome)+(f.tel?' <span style="font-size:11px;color:#8A9BAC;font-weight:400">'+esc(f.tel)+'</span>':'')+'</div>'+
      (f.contas||[]).filter(function(c){return noFiltro(c.date);}).map(function(c){
        return '<div class="rfc-row"><span>'+esc(c.desc)+' ('+isoToBR(c.date)+')</span><span>'+fmt(c.val)+' '+(c.pago?'✅':'⏳')+'</span></div>';
      }).join('')+
      '<div class="rfc-row"><span>✅ Pago</span><span style="color:#2E7D32">'+fmt(totPago)+'</span></div>'+
      '<div class="rfc-row"><span>⏳ Pendente</span><span style="color:#E65100">'+fmt(totPend)+'</span></div>'+
      '<button class="btn-wpp" onclick="enviarWpp(\''+f.id+'\')">WhatsApp</button>'+
    '</div>';
  });
  if(totGeral){
    html='<div class="rc full" style="margin-bottom:12px"><div class="rl">Total Geral</div><div class="rv">'+fmt(totGeral)+'</div><div class="rs">✅ '+fmt(totPagoGeral)+' · ⏳ '+fmt(totPendGeral)+'</div></div>'+html;
  }
  document.getElementById('relatorio-content').innerHTML=html||'<div class="empty">Nenhum dado</div>';
}

// ── Backup ────────────────────────────────────────────────────────────────────
function doBackup(){
  var blob=new Blob([JSON.stringify({version:2,exportedAt:new Date().toISOString(),data:db},null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='mmobras_'+new Date().toISOString().slice(0,10)+'.json';a.click();
}
function doRestore(inp){
  var file=inp.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var d=JSON.parse(e.target.result);var r=d.data||d;
      if(!r.fornecedores&&!r.mo&&!r.mat){alert('Arquivo inválido.');return;}
      if(!confirm('Restaurar backup? Dados atuais serão substituídos.'))return;
      db=r;
      if(!db.fornecedores)db.fornecedores=[];
      if(!db.listas)db.listas={todo:[],pendencias:[],compras:[],sobras:[]};
      ['todo','pendencias','compras','sobras'].forEach(function(k){if(!db.listas[k])db.listas[k]=[];});
      db.fornecedores.forEach(function(f){
        if(!f.tipo)f.tipo='servico';if(!f.tel)f.tel='';
        if(!f.pecas)f.pecas=[];if(!f.locacoes)f.locacoes=[];
        if(!f.contas)f.contas=[];if(!f.creditos)f.creditos=[];if(!f.recibos)f.recibos=[];
      });
      save();renderAll();renderForn();alert('Restaurado!');
    }catch(err){alert('Erro: '+err.message);}
    inp.value='';
  };
  reader.readAsText(file);
}

// ── Busca Global ─────────────────────────────────────────────────────────────
function toggleBuscaBar(){
  var bar=document.getElementById('busca-bar-global');
  var inp=document.getElementById('busca-global-input');
  if(bar.style.display==='none'){
    bar.style.display='block';
    if(inp)setTimeout(function(){inp.focus();},100);
  } else {
    bar.style.display='none';
    if(inp){inp.value='';document.getElementById('busca-global-res').innerHTML='';}
  }
}

function highlight(text, q){
  if(!q)return esc(text);
  var re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return esc(text).replace(re,'<mark style="background:#FFF3CD;color:#1B3A5C;border-radius:2px;padding:0 1px">$1</mark>');
}

function renderBuscaGlobal(){
  var q=(document.getElementById('busca-global-input').value||'').toLowerCase().trim();
  var el=document.getElementById('busca-global-res');
  if(q.length<1){el.innerHTML='';return;}

  var secForn=[],secLanc=[],secListas=[];

  // Fornecedores
  db.fornecedores.forEach(function(f){
    var fMatch=f.nome.toLowerCase().includes(q)||(f.cat||'').toLowerCase().includes(q)||(f.tel||'').includes(q);
    if(fMatch){
      var totPend=(f.contas||[]).filter(function(c){return !c.pago}).reduce(function(a,c){return a+c.val},0);
      var totAlg=(f.locacoes||[]).filter(function(l){return !l.encerrada&&!l.pago}).reduce(function(a,l){return a+calcTotalAluguel(f,l)},0);
      var pend=totPend+totAlg;
      secForn.push(
        '<div onclick="goPage('forn',document.querySelectorAll('.tab-btn')[1]);toggleBuscaBar();setTimeout(function(){var el=document.getElementById('fc-'+f.id+'');if(el){el.scrollIntoView({behavior:'smooth'});document.getElementById('fcb-'+f.id+'').classList.add('on');}},300)" '+
        'style="display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid #EAE7E0;background:#fff">'+
          '<div style="width:36px;height:36px;border-radius:50%;background:#1B3A5C;color:#C9A84C;display:flex;align-items:center;justify-content:center;font-family:Lora,serif;font-size:13px;font-weight:600;flex-shrink:0">'+esc(initials(f.nome))+'</div>'+
          '<div style="flex:1;min-width:0">'+
            '<div style="font-size:13px;font-weight:600;color:#1B3A5C">'+highlight(f.nome,q)+'</div>'+
            '<div style="font-size:10px;color:#8A9BAC">'+highlight(f.cat||f.tipo,q)+(f.tel?' · '+highlight(f.tel,q):'')+'</div>'+
          '</div>'+
          (pend?'<div style="text-align:right"><div style="font-size:10px;color:#8A9BAC">pendente</div><div style="font-size:13px;font-weight:700;font-family:Lora,serif;color:#E65100">'+fmt(pend)+'</div></div>':'')+
        '</div>'
      );
    }

    // Lançamentos deste fornecedor
    (f.contas||[]).forEach(function(ct){
      if((ct.desc||'').toLowerCase().includes(q)||(ct.obs||'').toLowerCase().includes(q)){
        secLanc.push(
          '<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-bottom:1px solid #EAE7E0;background:#fff" '+
          'onclick="goPage('forn',document.querySelectorAll('.tab-btn')[1]);toggleBuscaBar();setTimeout(function(){var el=document.getElementById('fc-'+f.id+'');if(el){el.scrollIntoView({behavior:'smooth'});document.getElementById('fcb-'+f.id+'').classList.add('on');}},300)">'+
            '<div style="flex:1;min-width:0">'+
              '<div style="font-size:12px;font-weight:600;color:#1A1918">'+highlight(ct.desc,q)+'</div>'+
              '<div style="font-size:10px;color:#8A9BAC">'+esc(f.nome)+' · '+isoToBR(ct.date)+(ct.obs?' · '+highlight(ct.obs,q):'')+'</div>'+
            '</div>'+
            '<div style="text-align:right;flex-shrink:0">'+
              '<div style="font-size:13px;font-weight:600;font-family:Lora,serif;color:#1B3A5C">'+fmt(ct.val)+'</div>'+
              '<span class="sbg '+(ct.pago?'pg':'pd')+'">'+(ct.pago?'pago':'pendente')+'</span>'+
            '</div>'+
          '</div>'
        );
      }
    });
  });

  // Listas
  var listaNomes={todo:'To Do',pendencias:'Pendências',compras:'Compras',sobras:'Sobras'};
  ['todo','pendencias','compras','sobras'].forEach(function(tipo){
    (db.listas[tipo]||[]).forEach(function(it){
      if((it.text||'').toLowerCase().includes(q)||(it.obs||'').toLowerCase().includes(q)){
        secListas.push(
          '<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-bottom:1px solid #EAE7E0;background:#fff" '+
          'onclick="listaAtual=''+tipo+'';goPage('listas',document.querySelectorAll('.tab-btn')[2]);toggleBuscaBar()">'+
            '<div style="width:28px;height:28px;border-radius:7px;background:#EAE7E0;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">'+(it.done?'✅':'⬜')+'</div>'+
            '<div style="flex:1;min-width:0">'+
              '<div style="font-size:12px;font-weight:600;color:#1A1918'+(it.done?';text-decoration:line-through;color:#8A9BAC':'')+'">'+highlight(it.text,q)+'</div>'+
              '<div style="font-size:10px;color:#8A9BAC">Lista: '+listaNomes[tipo]+(it.obs?' · '+highlight(it.obs,q):'')+'</div>'+
            '</div>'+
          '</div>'
        );
      }
    });
  });

  // MO/MAT legados
  (db.mo||[]).concat(db.mat||[]).forEach(function(i){
    var desc=i.desc||i.obs||'';
    if(desc.toLowerCase().includes(q)){
      secLanc.push(
        '<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;background:#fff;border-bottom:1px solid #EAE7E0">'+
          '<div style="flex:1"><div style="font-size:12px;font-weight:600">'+highlight(desc,q)+'</div>'+
          '<div style="font-size:10px;color:#8A9BAC">'+isoToBR(i.date)+'</div></div>'+
          '<div style="font-size:13px;font-weight:600;font-family:Lora,serif;color:#1B3A5C">'+fmt(i.val)+'</div>'+
        '</div>'
      );
    }
  });

  if(!secForn.length&&!secLanc.length&&!secListas.length){
    el.innerHTML='<div style="background:#fff;border-radius:10px;padding:14px;text-align:center;font-size:13px;color:#8A9BAC">Nenhum resultado para "<strong>'+esc(q)+'</strong>"</div>';
    return;
  }

  var html='';
  function sec(titulo,icone,items){
    if(!items.length)return;
    html+='<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:rgba(255,255,255,.6);padding:5px 14px 3px">'+icone+' '+titulo+'</div>'+
      '<div style="border-radius:10px;overflow:hidden;margin-bottom:6px">'+items.join('')+'</div>';
  }
  sec('Fornecedores','👤',secForn);
  sec('Lançamentos','💰',secLanc);
  sec('Listas','📋',secListas);
  el.innerHTML=html;
}
