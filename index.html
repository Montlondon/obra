<script>
var KEY='mmobras_v2';
var fTipo='servico', fForma='dinheiro', pfList=[], listaAt='todo';
var tiposTags=[], catsTags=[];
var eFid=null, eFcid=null, eCfid=null, eCcid=null, eLitipo=null, eLiid=null;
var filtro={ano:null,mes:null,sem:null,dia:null};

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function today(){return new Date().toISOString().slice(0,10);}
function br(s){if(!s)return '--';var p=s.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:'--';}
function fmt(v){return 'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ini(n){var w=n.trim().split(' ');return w.length>=2?(w[0][0]+w[w.length-1][0]).toUpperCase():n.slice(0,2).toUpperCase();}

function brtNow(){return new Date(new Date().toLocaleString('en-US',{timeZone:'America/Sao_Paulo'}));}
function updBRT(){
  var d=brtNow();
  var e=document.getElementById('bh');if(e)e.textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+' BRT';
  var dias=['Dom','Seg','Ter','Qua','Qui','Sex','Sab'],mes=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  var e2=document.getElementById('bd');if(e2)e2.textContent=dias[d.getDay()]+' '+d.getDate()+' '+mes[d.getMonth()];
}
updBRT();setInterval(updBRT,30000);

// DB
var SEED={config:{nome:'Obra Montgomery',empreiteiro:'Adson',local:'Basement',dataIni:'2026-06-22',dataFim:''},mo:[],mat:[],des:[],notas:{comprar:[],orcar:[]},hist:[],listas:{todo:[{id:'td1',text:'Tinta prata',obs:'',done:true}],pendencias:[],compras:[],sobras:[]},fornecedores:[{id:'adson001',nome:'Adson',tel:'',cat:'Pintor',tipo:'servico',contas:[{id:'a1',desc:'MO Pintura Basement',val:900,date:'2026-06-26',obs:'',pago:false,forma:'dinheiro'},{id:'a2',desc:'3 Tintas Rusterit + Eucatex Foresgreen',val:420,date:'2026-06-26',obs:'',pago:false,forma:'dinheiro'}],checklist:[],creditos:[],pecas:[],locacoes:[],recibos:[]},{id:'varandao001',nome:'Varandao',tel:'',cat:'Material',tipo:'material',contas:[{id:'v1',desc:'2 Fitas crepe',val:25,date:'2026-06-22',obs:'',pago:false,forma:'dinheiro'},{id:'v2',desc:'Lona 8.20m',val:53,date:'2026-06-22',obs:'',pago:false,forma:'dinheiro'},{id:'v3',desc:'Lona 8.00m',val:52,date:'2026-06-23',obs:'',pago:false,forma:'dinheiro'},{id:'v4',desc:'1 Fita crepe',val:12.5,date:'2026-06-23',obs:'',pago:false,forma:'dinheiro'},{id:'v5',desc:'Spray branco fosco',val:18,date:'2026-06-23',obs:'',pago:false,forma:'dinheiro'}],checklist:[],creditos:[],pecas:[],locacoes:[],recibos:[]},{id:'mdtintas001',nome:'MD Tintas',tel:'',cat:'Material',tipo:'material',contas:[{id:'m1',desc:'Tinta Desempenho Fosco Eucatex Extra Ultra',val:285,date:'2026-06-22',obs:'',pago:false,forma:'dinheiro'},{id:'m2',desc:'Tinta Desempenho Fosco Eucatex Extra Ultra',val:285,date:'2026-06-22',obs:'',pago:false,forma:'dinheiro'}],checklist:[],creditos:[],pecas:[],locacoes:[],recibos:[]},{id:'pedrao001',nome:'Pedrao da Carroca',tel:'33999572038',cat:'Locacao Equipamentos',tipo:'aluguel',contas:[],checklist:[],creditos:[],pecas:[{id:'p1',nome:'Andaime 1x1',qtd:10,valDia:3},{id:'p2',nome:'Tabuas',qtd:4,valDia:3},{id:'p3',nome:'Roda',qtd:4,valDia:3}],locacoes:[{id:'l1',dataInicio:'2026-06-29',dias:1,pago:false,encerrada:false}],recibos:[]}]};

var db;
try{db=JSON.parse(localStorage.getItem(KEY));}catch(e){db=null;}
if(!db||typeof db!=='object'){db=JSON.parse(JSON.stringify(SEED));save();}
if(!db.fornecedores)db.fornecedores=[];
if(!db.listas)db.listas={todo:[],pendencias:[],compras:[],sobras:[]};
['todo','pendencias','compras','sobras'].forEach(function(k){if(!db.listas[k])db.listas[k]=[];});
if(!db.notas)db.notas={comprar:[],orcar:[]};
if(!db.mo)db.mo=[];if(!db.mat)db.mat=[];if(!db.des)db.des=[];
if(!db.fornecedores.length){db.fornecedores=JSON.parse(JSON.stringify(SEED.fornecedores));save();}
db.fornecedores.forEach(function(f){
  if(!f.tipo)f.tipo='servico';if(!f.tel)f.tel='';
  if(!f.pecas)f.pecas=[];if(!f.locacoes)f.locacoes=[];
  if(!f.contas)f.contas=[];if(!f.creditos)f.creditos=[];if(!f.recibos)f.recibos=[];
  f.contas.forEach(function(c){if(!c.forma)c.forma='dinheiro';});
});
save();

function save(){try{localStorage.setItem(KEY,JSON.stringify(db));}catch(e){}}

// Filtro temporal
function getSems(ano,mes){
  var s=[],d=new Date(ano,mes,1),fim=new Date(ano,mes+1,0);
  while(d.getDay()!==1&&d<=fim)d.setDate(d.getDate()+1);
  while(d<=fim){var i=new Date(d),f=new Date(d);f.setDate(f.getDate()+6);if(f>fim)f=new Date(fim);s.push({i:i.toISOString().slice(0,10),f:f.toISOString().slice(0,10)});d.setDate(d.getDate()+7);}
  if(!s.length)s.push({i:new Date(ano,mes,1).toISOString().slice(0,10),f:fim.toISOString().slice(0,10)});
  return s;
}
function sf(c,v){filtro[c]=v;if(c==='ano'||c==='mes'){filtro.sem=null;filtro.dia=null;}if(c==='sem')filtro.dia=null;buildNav();renderAll();}
function inF(dt){
  if(!dt)return true;
  var d=new Date(dt+'T12:00:00');
  if(filtro.ano!==null&&d.getFullYear()!==filtro.ano)return false;
  if(filtro.mes!==null&&d.getMonth()!==filtro.mes)return false;
  if(filtro.sem!==null&&filtro.mes!==null){var sems=getSems(filtro.ano!==null?filtro.ano:d.getFullYear(),filtro.mes),s=sems[filtro.sem];if(s&&(dt<s.i||dt>s.f))return false;}
  if(filtro.dia!==null&&dt!==filtro.dia)return false;
  return true;
}
function buildNav(){
  var now=brtNow(),anoAt=now.getFullYear();
  var anos=[2025,2026].filter(function(a,i,ar){return ar.indexOf(a)===i;}).sort();
  var meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  var h='<span class="ntlv">Ano</span>';
  h+='<div class="ntc'+(filtro.ano===null?' on':'')+'" onclick="sf(\'ano\',null)">Todos</div>';
  anos.forEach(function(a){h+='<div class="ntc'+(filtro.ano===a?' on':'')+'" onclick="sf(\'ano\','+a+')">'+a+'</div>';});
  h+='<span class="nts">></span><span class="ntlv">Mes</span>';
  h+='<div class="ntc'+(filtro.mes===null?' on':'')+'" onclick="sf(\'mes\',null)">Todos</div>';
  meses.forEach(function(m,i){h+='<div class="ntc'+(filtro.mes===i?' on':'')+'" onclick="sf(\'mes\','+i+')">'+m+'</div>';});
  if(filtro.mes!==null){
    var anoS=filtro.ano!==null?filtro.ano:anoAt;
    var sems=getSems(anoS,filtro.mes);
    h+='<span class="nts">></span><span class="ntlv">Sem</span>';
    h+='<div class="ntc'+(filtro.sem===null?' on':'')+'" onclick="sf(\'sem\',null)">Todas</div>';

// Calcular aluguel
function calcAlg(f,l){if(!f.pecas||!f.pecas.length)return 0;return f.pecas.reduce(function(a,p){return a+(p.qtd*p.valDia);},0)*(l.dias||1);}

// Resumo
function renderRes(){
  var mo=0,mat=0,alg=0,cred=0,pago=0,pend=0;
  (db.mo||[]).forEach(function(i){if(inF(i.date))mo+=i.val||0;});
  (db.mat||[]).forEach(function(i){if(inF(i.date))mat+=i.val||0;});
  db.fornecedores.forEach(function(f){
    (f.contas||[]).forEach(function(c){if(!inF(c.date))return;if(f.tipo==='servico')mo+=c.val||0;else mat+=c.val||0;if(c.pago)pago+=c.val||0;else pend+=c.val||0;});
    (f.creditos||[]).forEach(function(c){if(inF(c.date))cred+=c.val||0;});
    (f.locacoes||[]).forEach(function(l){if(!inF(l.dataInicio))return;var t=calcAlg(f,l);alg+=t;if(l.pago)pago+=t;else pend+=t;});
  });
  document.getElementById('res-cards').innerHTML=
    '<div class="rc"><div class="rl">Mao de Obra</div><div class="rv">'+fmt(mo)+'</div></div>'+
    '<div class="rc"><div class="rl">Materiais</div><div class="rv">'+fmt(mat)+'</div></div>'+

// Tags
function addTag(kind){
  var inp=document.getElementById(kind==='tipo'?'mf-tipo-in':'mf-cat-in');
  var val=inp.value.trim();
  if(!val)return;
  if(kind==='tipo'){if(!tiposTags.includes(val))tiposTags.push(val);}
  else{if(!catsTags.includes(val))catsTags.push(val);}
  inp.value='';
  renderTags();
}
function removeTag(kind,idx){
  if(kind==='tipo')tiposTags.splice(idx,1);else catsTags.splice(idx,1);
  renderTags();
}

  var cw=document.getElementById('mf-cats-wrap');

}

// Listas

function renderLista(){var its=(db.listas||{})[listaAt]||[];var el=document.getElementById('lc');if(!its.length){el.innerHTML='<div class="empty">Nenhum item</div>';return;}el.innerHTML=its.map(function(it){return '<div class="litem"><div class="lic'+(it.done?' on':'')+'" onclick="tgLI(\''+listaAt+'\',\''+it.id+'\')"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div class="litx'+(it.done?' on':'')+'">'+esc(it.text)+(it.obs?'<div style="font-size:11px;color:#8A9BAC">'+esc(it.obs)+'</div>':'')+'</div><div style="display:flex;gap:4px"><button class="abt" onclick="editLI(\''+listaAt+'\',\''+it.id+'\')">editar</button><button class="abt del" onclick="delLID(\''+listaAt+'\',\''+it.id+'\')">del</button></div></div>';}).join('');}

// Calculadoras
function goCalc(n,btn){document.querySelectorAll('.cpanel').forEach(function(p){p.classList.remove('on');});document.querySelectorAll('.ctabs .ctab').forEach(function(b){b.classList.remove('on');});var el=document.getElementById('cp-'+n);if(el)el.classList.add('on');if(btn)btn.classList.add('on');}
function sRes(id,h){var el=document.getElementById(id);if(el){el.style.display='block';el.innerHTML=h;}}
function cTinta(){var l=+document.getElementById('tl').value,a=+document.getElementById('ta').value;if(!l||!a)return;var ar=(l*a)-(+document.getElementById('tj').value||0)-(+document.getElementById('tp').value||0);var lt=(ar*(+document.getElementById('td').value||2))/(+document.getElementById('tr').value||10);sRes('rt','<div class="crl">Area liquida</div><div class="crv">'+ar.toFixed(2)+' m2</div><div class="crs">'+lt.toFixed(1)+' litros / '+Math.ceil(lt/18)+' latas 18L / '+Math.ceil(lt/3.6)+' latas 3.6L</div>');}
function cTelha(){var c=+document.getElementById('tlc').value,l=+document.getElementById('tll').value;if(!c||!l)return;var ar=c*l,t=Math.ceil(ar*(+document.getElementById('tlpm').value||16)*(1+(+document.getElementById('tlq').value||10)/100));sRes('rth','<div class="crl">Area</div><div class="crv">'+ar.toFixed(2)+' m2</div><div class="crs">'+t+' telhas com quebra</div>');}
function cTijolo(){var c=+document.getElementById('tjc').value,a=+document.getElementById('tja').value;if(!c||!a)return;var ar=(c*a)-(+document.getElementById('tjd').value||0),t=Math.ceil(ar*(+document.getElementById('tjpm').value||25)*(1+(+document.getElementById('tjq').value||10)/100));sRes('rtj','<div class="crl">Area</div><div class="crv">'+ar.toFixed(2)+' m2</div><div class="crs">'+t+' tijolos com quebra</div>');}
function cArg(){var a=+document.getElementById('aga').value,e=+document.getElementById('age').value||20;if(!a)return;var v=a*(e/1000),s=Math.ceil(v/0.02);sRes('rag','<div class="crl">Volume</div><div class="crv">'+v.toFixed(3)+' m3</div><div class="crs">aprox '+s+' sacos 20kg</div>');}
function cCer(){var a=+document.getElementById('cea').value,t=+document.getElementById('cet').value||60,q=+document.getElementById('ceq').value||10;if(!a)return;var pm=Math.ceil(10000/(t*t)*10)/10,pc=Math.ceil(a*pm*(1+q/100));sRes('rce','<div class="crl">Pecas necessarias</div><div class="crv">'+pc+' pecas</div><div class="crs">'+pm.toFixed(1)+' pc/m2 / aprox '+Math.ceil(pc/8)+' caixas</div>');}
var cUpd=false;
function cConv(s){if(cUpd)return;cUpd=true;var g=function(id){return parseFloat(document.getElementById(id).value)||0;};var sv=function(id,v){document.getElementById(id).value=v?Number(v.toFixed(6)).toString():'';};var M2A=48400,M2H=10000,M2F=0.0929,MPI=0.0254,MPF=0.3048,MPC=0.01,KPL=0.453592,KPA=15,KPG=0.001;var m2,m,kg;if(['m2','al','ha','ft2'].includes(s)){if(s==='m2')m2=g('cm2');else if(s==='al')m2=g('cal')*M2A;else if(s==='ha')m2=g('cha')*M2H;else m2=g('cft2')*M2F;sv('cm2',m2);sv('cal',m2/M2A);sv('cha',m2/M2H);sv('cft2',m2/M2F);}if(['m','in','ft','cm'].includes(s)){if(s==='m')m=g('cm');else if(s==='in')m=g('cin')*MPI;else if(s==='ft')m=g('cft')*MPF;else m=g('ccm')*MPC;sv('cm',m);sv('cin',m/MPI);sv('cft',m/MPF);sv('ccm',m/MPC);}if(['kg','lb','ar','gr'].includes(s)){if(s==='kg')kg=g('ckg');else if(s==='lb')kg=g('clb')*KPL;else if(s==='ar')kg=g('car')*KPA;else kg=g('cgr')*KPG;sv('ckg',kg);sv('clb',kg/KPL);sv('car',kg/KPA);sv('cgr',kg/KPG);}cUpd=false;}

// Relatorio
function renderRel(){
  var q=(document.getElementById('rs')||{value:''}).value.toLowerCase();
  var list=db.fornecedores.filter(function(f){if(!q)return true;return f.nome.toLowerCase().includes(q)||(f.cat||'').toLowerCase().includes(q)||(f.tel||'').includes(q)||(f.contas||[]).some(function(c){return (c.desc||'').toLowerCase().includes(q);});});
  var h='',gtot=0,gpago=0,gpend=0;
  list.forEach(function(f){var pg=0,pd=0;(f.contas||[]).forEach(function(c){if(inF(c.date)){if(c.pago)pg+=c.val||0;else pd+=c.val||0;}});(f.locacoes||[]).forEach(function(l){if(inF(l.dataInicio)){var t=calcAlg(f,l);if(l.pago)pg+=t;else pd+=t;}});var tot=pg+pd;if(!tot)return;gtot+=tot;gpago+=pg;gpend+=pd;h+='<div class="rfc"><div class="rfcn">'+esc(f.nome)+(f.tel?' <span style="font-size:11px;color:#8A9BAC;font-weight:400">'+esc(f.tel)+'</span>':'')+'</div>'+(f.contas||[]).filter(function(c){return inF(c.date);}).map(function(c){return '<div class="rfcr"><span>'+esc(c.desc)+' ('+br(c.date)+')</span><span>'+fmt(c.val)+' '+(c.pago?'ok':'pend')+'</span></div>';}).join('')+'<div class="rfcr"><span>Pago</span><span style="color:#2E7D32">'+fmt(pg)+'</span></div><div class="rfcr"><span>Pendente</span><span style="color:#E65100">'+fmt(pd)+'</span></div><button class="wppbtn" onclick="envWpp(\''+f.id+'\')">WhatsApp</button></div>';});
  if(gtot)h='<div class="rc full" style="margin-bottom:12px"><div class="rl">Total Geral</div><div class="rv">'+fmt(gtot)+'</div><div class="rs">Pago: '+fmt(gpago)+' / Pendente: '+fmt(gpend)+'</div></div>'+h;
  document.getElementById('rc2').innerHTML=h||'<div class="empty">Nenhum dado</div>';
}

// WhatsApp
function envWpp(fid){var f=db.fornecedores.find(function(x){return x.id===fid;});if(!f)return;var msg='*MMObras - '+f.nome+'*\n'+new Date().toLocaleDateString('pt-BR')+'\n\n';if(f.tipo==='aluguel'){var td=(f.pecas||[]).reduce(function(a,p){return a+(p.qtd*p.valDia);},0);(f.pecas||[]).forEach(function(p){msg+=p.nome+' '+p.qtd+'x R$'+p.valDia.toFixed(2)+'/dia\n';});msg+='\nR$/dia: '+fmt(td)+'\n';(f.locacoes||[]).filter(function(l){return !l.encerrada;}).forEach(function(l){msg+='Dias: '+l.dias+' | Total: '+fmt(td*l.dias)+'\nStatus: '+(l.pago?'Pago':'Pendente')+'\n';});}else{var pg=0,pd=0;(f.contas||[]).forEach(function(c){msg+=c.desc+' ('+br(c.date)+'): '+fmt(c.val)+' '+(c.pago?'ok':'pend')+'\n';if(c.pago)pg+=c.val;else pd+=c.val;});msg+='\nPago: '+fmt(pg)+'\nPendente: '+fmt(pd);}var tel=(f.tel||'').replace(/\D/g,'');window.open('https://wa.me/'+(tel?'55'+tel:'')+'?text='+encodeURIComponent(msg),'_blank');}

function doBackup(){var b=new Blob([JSON.stringify({version:2,exportedAt:new Date().toISOString(),data:db},null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='mmobras_'+today()+'.json';a.click();}
function doRestore(inp){var file=inp.files[0];if(!file)return;var r=new FileReader();r.onload=function(e){try{var d=JSON.parse(e.target.result);var rd=d.data||d;if(!rd.fornecedores&&!rd.mo&&!rd.mat){alert('Arquivo invalido.');return;}if(!confirm('Restaurar? Dados atuais serao substituidos.'))return;db=rd;if(!db.fornecedores)db.fornecedores=[];if(!db.listas)db.listas={todo:[],pendencias:[],compras:[],sobras:[]};['todo','pendencias','compras','sobras'].forEach(function(k){if(!db.listas[k])db.listas[k]=[];});db.fornecedores.forEach(function(f){if(!f.tipo)f.tipo='servico';if(!f.tel)f.tel='';if(!f.pecas)f.pecas=[];if(!f.locacoes)f.locacoes=[];if(!f.contas)f.contas=[];if(!f.creditos)f.creditos=[];if(!f.recibos)f.recibos=[];});save();renderAll();renderForn();alert('Restaurado!');}catch(err){alert('Erro: '+err.message);}inp.value='';};r.readAsText(file);}

-shrink:0"><div style="font-size:13px;font-weight:600;font-family:Lora,serif;color:#1B3A5C">'+fmt(c.val)+'</div><span class="sbg '+(c.pago?'pg':'pd')+'">'+(c.pago?'pago':'pendente')+'</span></div></div>');}});});['todo','pendencias','compras','sobras'].forEach(function(t){(db.listas[t]||[]).forEach(function(it){if((it.text||'').toLowerCase().includes(q)){res.push('<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-bottom:1px solid #EAE7E0;background:#fff" onclick="listaAt=\''+t+'\';goPg(\'listas\',document.querySelectorAll(\'.tb\')[2]);tgGB()"><div style="width:20px;height:20px;border-radius:5px;background:#EAE7E0;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0">'+(it.done?'v':'o')+'</div><div style="flex:1"><div style="font-size:12px;font-weight:600">'+hl(it.text,q)+'</div><div style="font-size:10px;color:#8A9BAC">Lista: '+t+'</div></div></div>');} });});el.innerHTML=res.length?'<div style="background:#fff;border-radius:10px;overflow:hidden">'+res.join('')+'</div>':'<div style="background:#fff;border-radius:10px;padding:14px;text-align:center;font-size:13px;color:#8A9BAC">Nenhum resultado</div>';}
